apiVersion: mongodbcommunity.mongodb.com/v1
kind: MongoDBCommunity
metadata:
  name: mongodb-replica-set
  namespace: default
spec:
  members: 2
  type: ReplicaSet
  version: "6.0.5"
  security:
    authentication:
      modes: ["SCRAM"]
  users:
    - name: admin
      db: admin
      passwordSecretRef:
        name: admin-password
      roles:
        - name: clusterAdmin
          db: admin
        - name: userAdminAnyDatabase
          db: admin
      scramCredentialsSecretName: admin-scram
  statefulSet:
    spec:
      template:
        spec:
          containers:
            - name: mongod
              resources:
                limits:
                  cpu: "200m"
                  memory: "256Mi"
                requests:
                  cpu: "100m"
                  memory: "128Mi"
            - name: mongodb-agent
              resources:
                limits:
                  cpu: "200m"
                  memory: "256Mi"
                requests:
                  cpu: "100m"
                  memory: "128Mi"
---
apiVersion: v1
kind: Secret
metadata:
  name: admin-password
  namespace: default
type: Opaque
stringData:
  password: "admin123"
