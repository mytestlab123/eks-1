apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: mongodbcommunity.mongodbcommunity.mongodb.com
spec:
  group: mongodbcommunity.mongodb.com
  scope: Namespaced
  names:
    kind: MongoDBCommunity
    listKind: MongoDBCommunityList
    plural: mongodbcommunity
    singular: mongodbcommunity
    shortNames:
    - mdbc
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              members:
                type: integer
                minimum: 1
              type:
                type: string
                enum: ["ReplicaSet"]
              version:
                type: string
              security:
                type: object
                properties:
                  authentication:
                    type: object
              users:
                type: array
                items:
                  type: object
              additionalMongodConfig:
                type: object
              statefulSet:
                type: object
          status:
            type: object
